name: Weekly Instagram Story

on:
  schedule:
    - cron: '0 8 * * MON'  # Every Monday at 08:00 UTC
  workflow_dispatch:  # Also allow manual trigger

jobs:
  post_story:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install sv_SE.UTF-8 locale
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen sv_SE.UTF-8
          sudo update-locale LANG=sv_SE.UTF-8
          export LANG=sv_SE.UTF-8

      - name: Restore Insta settings
        run: |
          echo "$IG_SESSION_B64" | base64 --decode > insta_settings.json
        env:
          IG_SESSION_B64: ${{ secrets.IG_SESSION_B64 }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies from requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run Instagram Story script
        env:
          BURNER_USERNAME: ${{ secrets.BURNER_USERNAME }}
          BURNER_PASSWORD: ${{ secrets.BURNER_PASSWORD }}
        run: python v3.py

      # Save updated session back as artifact (for manual re-upload to secrets)
      - name: Upload updated session
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: insta-session
          path: insta_settings.json
          retention-days: 7
